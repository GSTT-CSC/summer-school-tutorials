risks:
    - hazard_id: HZ-01
      hazard: Inaccurate Earth circumference estimate
      software_item: EarthMeasurer
      causes: Gnomon is not perfectly vertical.<br>Shadow angle is measured at the wrong time of day.<br>Atmospheric refraction bends sunlight, shifting the apparent shadow angle.
      effects: The calculated circumference is incorrect.
      harm: Ships navigate using maps with incorrect scale, increasing risk of running aground or missing port.
      severity: Serious
      likelihood: Low
      risk: Low
      risk_control: HZ-01-01 validates that shadow angles are within physically plausible bounds before computing the circumference.
      residual_severity: Serious
      residual_likelihood: Extremely Low
      residual_risk: Low
      comment: Eratosthenes got within 2% of the correct answer using a stick. Good enough for v1.0.0.
