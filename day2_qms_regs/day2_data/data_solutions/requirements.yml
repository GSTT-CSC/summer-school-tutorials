requirements:
  - id: SRS-001
    title: Accept hand X-ray DICOM inputs
    type: Input/Output
    description: The software MUST accept hand X-ray DICOM files whose Modality is CR or DX, and MUST reject other modalities.
    linked_risk_control:
    priority: v1.0.0
  - id: SRS-002
    title: Only process AP or PA hand X-ray views
    type: Safety
    description: The software MUST only process AP or PA hand X-ray views and MUST reject oblique or unsupported views.
    linked_risk_control: HZ-01
    priority: v1.0.0

sys_des_spec:
  - id: SDS-001
    title: DICOM input validation
    linked_reqs: SRS-001
    description: Validate that each input is a DICOM hand X-ray whose Modality tag is CR or DX before processing.
  - id: SDS-002
    title: Image view classifier
    linked_reqs: SRS-002
    description: Classify the hand X-ray view and continue processing only for AP or PA images, rejecting oblique views.
