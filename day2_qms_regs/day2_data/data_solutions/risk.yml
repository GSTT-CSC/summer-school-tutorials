risk_levels:
    - label: Low
      description: Acceptable
    - label: Medium
      description: Investigate further risk reduction. Should be reduced as low as reasonably practicable.
    - label: High
      description: Unacceptable. Further risk mitigations are required.
risk_probability_levels:
    - label: Extremely Low
      description: Extremely unlikely
    - label: Low
      description: Unlikely
    - label: Medium
      description: Somewhat likely
    - label: High
      description: Likely
    - label: Extremely High
      description: Extremely likely
risk_severity_levels:
    - label: Negligible
      description: Inconvenience or temporary discomfort
    - label: Minor
      description: Results in temporary injury or impairment not requiring professional medical intervention
    - label: Serious
      description: Results in injury or impairment requiring professional medical intervention
    - label: Critical
      description: Results in permanent impairment or life-threatening injury
    - label: Catastrophic
      description: Results in patient death
risk_acceptability_matrix:
    - [Low, Low, Low, Low, Low]
    - [Low, Low, Low, Low, Medium]
    - [Low, Low, Low, Medium, Medium]
    - [Low, Low, Medium, Medium, High]
    - [Low, Medium, Medium, High, High]
risks:
    - hazard_id: HZ-01
      hazard: False screening result from an unsupported image view
      software_item: HandOsteo
      causes: The software processes an oblique view as though it were AP or PA.
      effects: The MCP measurement is taken from an unsuitable image, producing an incorrect screening result.
      harm: Unnecessary treatment and follow-up imaging, or a missed diagnosis.
      severity: Serious
      likelihood: Medium
      risk: Medium
      risk_control: The view classifier rejects oblique views so only AP or PA images are measured (SDS-002).
      residual_severity: Serious
      residual_likelihood: Low
      residual_risk: Low
      comment: The result is intended to support clinical review rather than provide an autonomous diagnosis.
